version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: codereviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  celery:
    build:
      context: ./backend
    command: celery -A core worker --loglevel=info
    env_file:
      - .env
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis

  ai_service:
    build:
      context: ./ai_service
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    env_file:
      - .env
    volumes:
      - ./ai_service:/app
    ports:
      - "8001:8001"
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host
    env_file:
      - .env
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
